paths:
  data_dir: data
  artifacts_dir: artifacts
  results_dir: results

dataset:
  name: stackoverflow/stacksample
  target_objects: 520000
  random_seed: 20260714

embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  dimension: 384
  max_sequence_length: 256
  batch_size: 64

pca:
  output_dimension: 128
  sample_size: 100000
  transform_batch_size: 10000

hnsw:
  m: 16
  ef_construction: 100
  ef_search: 128

reranker:
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  retrieval_candidates: 40
  final_sources: 3
  batch_size: 32

ollama:
  base_url: http://localhost:11434
  model_name: qwen2.5:3b
  temperature: 0.0
  context_length: 4096
  maximum_answer_words: 140

evaluation:
  retrieval_queries: 2000
  latency_queries: 100
  calibration_in_domain: 40
  calibration_out_of_domain: 20
  rag_in_domain: 20
  rag_out_of_domain: 8
